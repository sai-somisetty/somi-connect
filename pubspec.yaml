name: somi_connect
description: SOMI Connect — parent dashboard for student progress, health, and nudges.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Networking & device
  dio: ^5.7.0
  connectivity_plus: ^6.1.1
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  isar_community: ^3.3.0-dev.3

  # UI
  fl_chart: ^0.69.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Backend / realtime (optional until env configured)
  supabase_flutter: ^2.8.4

  # Models & i18n
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.19.0

  # Settings / links
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1

  # Push & uploads (Phase 3)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  image_picker: ^1.1.2
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
